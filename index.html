<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h3>Todo App</h3>
        <!-- form -->
        <form id="form">
            <input type="text" placeholder="Enter you'r todo" id="display" required>
            <select id="priority">
                <option value="low">Low Priority</option>
                <option value="medium" selected>Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
            <button type="submit">Add</button>
        </form>

        <!-- AddTotalTosos -->
         <p id="totalTodos"></p>
        <!-- FilterOptionButtons -->
        <section class="filterBtns">
            <button onclick="filterOpt('all')" class="active">All</button>
            <button onclick="filterOpt('pending')">Pending</button>
            <button onclick="filterOpt('completed')">Completed</button>
        </section>

        <!-- TodosList -->
         <ul id="list"></ul>
    </div>
    <script src="script.js"></script>
</body>

</html>
