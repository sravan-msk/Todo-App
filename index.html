<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h3>Todo App</h3>
        <!-- form -->
        <form id="form">
            <input type="text" placeholder="Write You'r todo.." id="display" required>
            <select id="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Add</button>
        </form>

        <!-- AddTotalTosos -->
         <p id="totalTodos"></p>
        <!-- FilterOptionButtons -->
        <section class="filterBtns">
            <button onclick="filterOpt('all')" class="active">All</button>
            <button onclick="filterOpt('pending')">Pending</button>
            <button onclick="filterOpt('completed')">Completed</button>
        </section>

        <!-- TodosList -->
         <ul id="list"></ul>
    </div>
    <script src="script.js"></script>
</body>

</html>
