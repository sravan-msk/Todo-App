<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- form -->
        <form id="form">
            <input type="text" placeholder="Enter You'r todo.." id="display" required>
            <select id="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Add</button>
        </form>

        <!-- FilterOptionButtons -->
        <section id="filterBtns">
            <button onclick="filter('all')">All</button>
            <button onclick="filter('pending')">Pending</button>
            <button onclick="filter('completed')">Completed</button>
        </section>

        <!-- TodosList -->
         <ul id="list"></ul>
<!-- 
         <span class="${todo.completed ? line : ''}" onclick="toggle(${idx})">${todo.text}</span>
         <span class="${todo.priority}">${todo.priority}</span>
         <button onclick="del(${idx})">Del</button>
         <button onclick="edit(${idx})">Edit</button> -->
    </div>
    <script src="script.js"></script>
</body>

</html>
